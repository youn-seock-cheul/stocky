name: Daily Stock Report

on:
  push:
    branches: [ main ] # main 브랜치에 푸시될 때마다 실행
  schedule:
    # 1. 한국 증시 개장 전 전략 리포트 (KST 월-금 07:50 / UTC 일-목 22:50)
    - cron: '50 22 * * 0-4'
    # 2. 미국 증시 마감 후 결과 리포트 (KST 화-토 06:00 / UTC 월-금 21:00)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # 매매 분석 및 수동 실행
    inputs:
      category:
        description: '투자 유형 (국내주식 / 국내 ETF / 해외 개인주식)'
        required: false
        type: choice
        options:
          - '국내주식'
          - '국내 ETF'
          - '해외 개인주식'
      action:
        description: '작업 선택 (매수 / 매도 / 신규진입)'
        required: false
        type: choice
        options:
          - '매수'
          - '매도'
          - '신규진입'
      ticker:
        description: '종목코드 (예: 005930.KS, AAPL, QQQ)'
        required: false
      reason:
        description: '매매 사유 (선택 사항)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소에 파일을 다시 쓰기 위한 권한

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -f -v
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yfinance pandas google-genai requests telegraph matplotlib numpy pillow python-dotenv
          pip install finance-datareader pandas requests

      - name: Run daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_CATEGORY: ${{ github.event.inputs.category }}
          TRADE_ACTION: ${{ github.event.inputs.action }}
          TRADE_TICKER: ${{ github.event.inputs.ticker }}
          TRADE_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          echo "TELEGRAM_TOKEN=$TELEGRAM_TOKEN" >> .env
          echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
          echo "TRADE_CATEGORY=$TRADE_CATEGORY" >> .env
          echo "TRADE_ACTION=$TRADE_ACTION" >> .env
          echo "TRADE_TICKER=$TRADE_TICKER" >> .env
          echo "TRADE_REASON=$TRADE_REASON" >> .env
          python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json
          # 하위 폴더를 포함하여 분석된 스크린샷 삭제
          git rm -rf screenshots/**/Screenshot_* || true 
          git commit -m "docs: AI 자동 잔고 업데이트 및 데이터 동기화" || exit 0
          git push
