name: Daily Stock Report

on:
  push:
    branches: [ main ] # main 브랜치에 푸시될 때마다 실행
  schedule:
    # 1. 한국 증시 개장 전 전략 리포트 (KST 월-금 07:50 / UTC 일-목 22:50)
    - cron: '50 22 * * 0-4'
    # 2. 미국 증시 마감 후 결과 리포트 (KST 화-토 06:00 / UTC 월-금 21:00)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화 (테스트용)

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas google-genai requests telegraph

      - name: Run daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
